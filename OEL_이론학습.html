<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>OEL 이론학습</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#F8FAFC;color:#1E293B;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:90px;}
[onclick],button,.unit-card,.chapter-header,.back-btn,.quiz-opt,.done-btn,.speak-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer;}
.app-header{background:linear-gradient(135deg,#1E3A5F,#2563EB);color:#fff;padding:16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.app-title{font-size:16px;font-weight:800;}
.app-sub{font-size:11px;opacity:.8;margin-top:2px;}
.home-banner{background:linear-gradient(135deg,#0F172A,#1E40AF);color:#fff;padding:20px 16px;text-align:center;}
.banner-title{font-size:22px;font-weight:900;margin-bottom:6px;}
.banner-sub{font-size:13px;opacity:.8;}
.unit-grid{padding:12px;}
.unit-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;}
.unit-emoji{font-size:28px;width:44px;text-align:center;}
.unit-info{flex:1;}
.unit-name{font-size:15px;font-weight:800;margin-bottom:3px;}
.unit-desc{font-size:11px;color:#64748B;}
.unit-progress{font-size:11px;font-weight:700;color:#2563EB;margin-top:4px;}
.chapter-list{padding:12px;}
.back-btn{display:flex;align-items:center;gap:6px;background:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;color:#1E3A5F;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.unit-title-bar{background:linear-gradient(135deg,#1E3A5F,#2563EB);color:#fff;border-radius:12px;padding:14px;margin-bottom:12px;text-align:center;}
.unit-title-name{font-size:16px;font-weight:900;}
.chapter-item{background:#fff;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;}
.chapter-header{display:flex;align-items:center;padding:14px;gap:10px;}
.ch-num{width:26px;height:26px;border-radius:50%;background:#EFF6FF;color:#2563EB;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ch-title{flex:1;font-size:13px;font-weight:700;color:#1E293B;}
.ch-arrow{font-size:12px;color:#94A3B8;transition:transform .2s;}
.ch-arrow.open{transform:rotate(90deg);}
.ch-done{font-size:11px;color:#10B981;font-weight:700;}
.chapter-body{display:none;padding:0 14px 14px;border-top:1px solid #F1F5F9;}
.chapter-body.open{display:block;}
.content-intro{background:#F0F9FF;border-left:3px solid #2563EB;border-radius:0 8px 8px 0;padding:10px 12px;margin:10px 0;font-size:12.5px;line-height:1.8;color:#1E3A5F;}
.key-box{border-radius:12px;padding:12px 14px;margin:10px 0;}
.key-box-title{font-size:12px;font-weight:800;margin-bottom:8px;}
.key-row{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:12px;}
.key-row:last-child{border-bottom:none;}
.key-label{font-weight:700;color:#374151;min-width:80px;flex-shrink:0;}
.key-val{color:#1E293B;flex:1;}
.key-num{font-weight:900;color:#2563EB;}
.formula-inline{background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:12px;margin:10px 0;font-size:12.5px;font-family:monospace;line-height:2;}
.comment{color:#92400E;}
.result{font-weight:900;color:#D97706;}
.highlight{color:#DC2626;font-weight:700;}
.tip-box{background:#F0FDF4;border-left:3px solid #10B981;border-radius:0 8px 8px 0;padding:10px 12px;margin:10px 0;}
.tip-box-title{font-size:11px;font-weight:800;color:#065F46;margin-bottom:4px;}
.tip-text{font-size:12px;line-height:1.8;color:#064E3B;}
.warn-box{background:#FFF7ED;border-left:3px solid #F59E0B;border-radius:0 8px 8px 0;padding:10px 12px;margin:10px 0;}
.warn-title{font-size:11px;font-weight:800;color:#92400E;margin-bottom:4px;}
.warn-text{font-size:12px;line-height:1.8;color:#78350F;}
.memo-box{background:linear-gradient(135deg,#F0F9FF,#E0F2FE);border:1.5px solid #7DD3FC;border-radius:12px;padding:12px 14px;margin:10px 0;}
.memo-box-title{font-size:11px;font-weight:900;color:#0369A1;margin-bottom:8px;}
.memo-text{font-size:12px;line-height:1.8;color:#1E40AF;}
.trap-box{background:linear-gradient(135deg,#FFF1F2,#FFE4E6);border:1.5px solid #FDA4AF;border-radius:12px;padding:12px 14px;margin:10px 0;}
.trap-title{font-size:11px;font-weight:900;color:#BE123C;margin-bottom:8px;}
.trap-text{font-size:12px;line-height:1.8;color:#881337;}
.exam-box{background:linear-gradient(135deg,#F5F3FF,#EDE9FE);border:1.5px solid #A78BFA;border-radius:12px;padding:12px 14px;margin:10px 0;}
.exam-title{font-size:11px;font-weight:900;color:#6D28D9;margin-bottom:8px;}
.exam-text{font-size:12px;line-height:1.8;color:#4C1D95;}
.compare-table-wrap{overflow-x:auto;margin:10px 0;}
.compare-table{width:100%;border-collapse:collapse;font-size:11.5px;}
.compare-table th{background:#1E3A5F;color:#fff;padding:7px 6px;text-align:center;}
.compare-table td{padding:6px;border:1px solid #E2E8F0;text-align:center;}
.compare-table tr:nth-child(even) td{background:#F8FAFC;}
.quiz-section{background:#F8FAFC;border-radius:12px;padding:14px;margin-top:14px;border:1.5px solid #E2E8F0;}
.quiz-title{font-size:11px;font-weight:800;color:#6B7280;margin-bottom:10px;}
.quiz-q{font-size:13px;font-weight:700;color:#1E293B;margin-bottom:12px;line-height:1.6;}
.quiz-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.quiz-opt{background:#fff;border:1.5px solid #E2E8F0;border-radius:8px;padding:10px 12px;font-size:12.5px;text-align:left;transition:all .15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer;}
.quiz-opt.correct{background:#ECFDF5;border-color:#10B981;color:#065F46;font-weight:700;}
.quiz-opt.wrong{background:#FFF1F2;border-color:#FDA4AF;color:#BE123C;}
.quiz-opt.disabled{pointer-events:none;}
.quiz-ex{background:#FFFBEB;border-radius:8px;padding:10px;font-size:12px;line-height:1.7;color:#92400E;margin-top:8px;display:none;}
.quiz-ex.show{display:block;}
.done-btn{width:100%;padding:10px;background:#7C3AED;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;margin-top:14px;}
.speak-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,#0369A1,#2563EB);border:none;border-radius:10px;color:#fff;padding:10px 14px;font-size:13px;font-weight:700;width:100%;margin:10px 0 4px;}
.tts-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:linear-gradient(135deg,#0F172A,#1E3A5F);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:8px;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.3);transition:transform .3s;}
.tts-bar.hidden{transform:translateX(-50%) translateY(100%);}
.tts-btn{background:rgba(255,255,255,.15);border:none;border-radius:16px;color:#fff;padding:6px 12px;font-size:12px;font-weight:700;touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.tts-title{flex:1;font-size:11px;opacity:.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tts-speed{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;font-size:11px;padding:5px 4px;}
</style>
</head>
<body ontouchstart="">
<div class="app-header">
  <div>
    <div class="app-title">📚 OEL 이론학습</div>
    <div class="app-sub">품질분석 3급 · 단원 선택 · 🔊 음성 지원</div>
  </div>
</div>
<div id="root"></div>

<div class="tts-bar hidden" id="ttsBar">
  <button class="tts-btn" id="ttsPlayBtn" onclick="ttsPlayPause()" ontouchstart="">⏸ 일시정지</button>
  <div class="tts-title" id="ttsTitle">재생 중...</div>
  <select class="tts-speed" id="ttsSpeed" onchange="ttsChangeSpeed()" ontouchstart="">
    <option value="0.7">0.7x</option>
    <option value="0.85" selected>0.85x</option>
    <option value="1.0">1.0x</option>
    <option value="1.2">1.2x</option>
  </select>
  <button class="tts-btn" onclick="ttsStop()" ontouchstart="">■ 정지</button>
</div>

<script>
var UNITS = [
{
  id:'5g', name:'5G 기술', emoji:'📡', color:'#3B82F6', bg:'#EFF6FF',
  desc:'NR Frame · RSRP · SSB · Beamforming · MIMO · Bearer · 변조방식',
  chapters: [
    {
      title:'5G가 왜 필요한가? (IMT-2020)',
      content: '<div class="content-intro">4G LTE는 최대 1Gbps를 목표로 만들어졌어요. 자율주행·IoT·AR 같은 서비스가 등장하면서 더 빠르고 더 많이 반응하는 망이 필요해졌고, ITU가 5G 최소 성능 기준을 정했어요. 이것이 <b>IMT-2020</b>이에요.</div><div class="key-box" style="background:#EFF6FF;border:1px solid #BFDBFE;"><div class="key-box-title" style="color:#3B82F6;">📌 ITU IMT-2020 핵심 수치 (시험 단골!)</div><div class="key-row"><span class="key-label">최대 DL 속도</span><span class="key-val"><span class="key-num">20 Gbps</span></span></div><div class="key-row"><span class="key-label">최대 UL 속도</span><span class="key-val"><span class="key-num">10 Gbps</span></span></div><div class="key-row"><span class="key-label">지연 시간</span><span class="key-val"><span class="key-num">1 ms</span> (LTE는 10ms)</span></div><div class="key-row"><span class="key-label">이동 속도</span><span class="key-val"><span class="key-num">500 km/h</span></span></div></div><div class="trap-box"><div class="trap-title">🪤 함정</div><div class="trap-text">UL은 10Gbps (DL의 절반). 지연 10ms는 LTE! 5G는 1ms.</div></div><div class="exam-box"><div class="exam-title">📝 출제 포인트</div><div class="exam-text">LTE: DL 1Gbps / 지연 10ms → 5G: DL 20Gbps / 지연 1ms (각 20배·10배 개선)</div></div>',
      quiz: {q:'5G IMT-2020 기준 최대 다운링크(DL) 속도는?', opts:['10Gbps','20Gbps','1Gbps','100Gbps'], ans:1, ex:'ITU IMT-2020: DL 20Gbps / UL 10Gbps / 지연 1ms / 이동속도 500km/h'}
    },
    {
      title:'NSA vs SA · EN-DC란?',
      content: '<div class="content-intro">5G 초기에 기존 LTE 코어(EPC)와 기지국을 그대로 쓰면서 5G NR 기지국만 추가하는 방식이 NSA예요.</div><div class="compare-table-wrap"><table class="compare-table"><tr><th>구분</th><th>NSA (현재 주력)</th><th>SA (미래)</th></tr><tr><td>코어망</td><td class="highlight">LTE EPC</td><td>5G Core (5GC)</td></tr><tr><td>제어</td><td class="highlight">LTE eNB</td><td>5G gNB</td></tr></table></div><div class="key-box" style="background:#F0FDF4;border:1px solid #BBF7D0;"><div class="key-box-title" style="color:#059669;">📌 EN-DC</div><div class="key-row"><span class="key-label">MN (Master)</span><span class="key-val">LTE eNB — 제어 담당</span></div><div class="key-row"><span class="key-label">SN (Secondary)</span><span class="key-val">5G gNB — 데이터 추가</span></div></div><div class="memo-box"><div class="memo-box-title">🧠 암기</div><div class="memo-text">LTE 선배(eNB)가 먼저 연결해주고 5G 후배(gNB)를 소개시켜 줘요. NSA 코어는 EPC(5GC 아님!)</div></div>',
      quiz: {q:'5G NSA 구조에서 코어망은?', opts:['5GC','EPC','MME','SGW'], ans:1, ex:'NSA(Non-Standalone): LTE eNB가 MN(제어), 5G gNB가 SN(데이터). 코어망은 LTE EPC 사용.'}
    },
    {
      title:'5G NR Frame 구조 (SCS·RB·TTI)',
      content: '<div class="content-intro">LTE는 항상 15kHz로 주파수를 나눠 사용했어요. 5G NR은 SCS를 유연하게 바꿀 수 있고, SCS가 넓을수록 TTI가 짧아져 지연이 줄어요.</div><div class="key-box" style="background:#FDF4FF;border:1px solid #E9D5FF;"><div class="key-box-title" style="color:#7C3AED;">📌 SCS별 RB 수와 TTI</div><div class="key-row"><span class="key-label">3.5GHz</span><span class="key-val">SCS 30kHz / TTI <b>0.5ms</b> / 100MHz → <b>273 RB</b></span></div><div class="key-row"><span class="key-label">28GHz</span><span class="key-val">SCS 120kHz / TTI <b>0.125ms</b> / 100MHz → <b>264 RB</b></span></div></div><div class="formula-inline">TTI = 1ms / (SCS / 15kHz)<br><span class="comment">SCS 30kHz → 1ms / 2 = </span><span class="result">0.5ms</span></div><div class="memo-box"><div class="memo-box-title">🧠 암기</div><div class="memo-text">3.5GHz "삼오" → 273 RB, 0.5ms / 28GHz "이팔" → 264 RB, 0.125ms</div></div>',
      quiz: {q:'5G NR 3.5GHz(SCS 30kHz, 100MHz) 사용 시 RB 수와 TTI는?', opts:['264개/0.125ms','273개/0.5ms','106개/1ms','132개/0.25ms'], ans:1, ex:'SCS 30kHz → TTI 0.5ms, 100MHz BW → 273 RB. 28GHz(SCS 120kHz)는 0.125ms, 264 RB.'}
    },
    {
      title:'5G RSRP 환산 (계산 필수!)',
      content: '<div class="content-intro">단말이 측정한 rsrpResult 숫자를 실제 dBm으로 환산하는 공식이에요. LTE와 5G의 기준값이 달라요!</div><div class="formula-inline">LTE RSRP = <b>-140</b> + rsrpResult (dBm)<br><span class="comment">예) rsrpResult=56 → </span><span class="result">-84dBm</span><br>5G SS-RSRP = <b>-156</b> + rsrpResult (dBm)<br><span class="comment">예) rsrpResult=82 → </span><span class="result">-74dBm</span><br>RSRQ = (rsrqResult - 40) / 2 (dB)</div><div class="memo-box"><div class="memo-box-title">🧠 암기</div><div class="memo-text">LTE -140 (4G=4글자=140의 4로 끝) / 5G -156 (156에 5가 들어있음). 5G가 16 더 낮아요.</div></div><div class="trap-box"><div class="trap-title">🪤 함정</div><div class="trap-text">rsrpResult=62일 때: LTE → -78dBm, 5G → -94dBm. 기술 먼저 확인하고 계산!</div></div>',
      quiz: {q:'5G MR에서 rsrpResult-r15=82일 때 SS-RSRP는?', opts:['-74dBm','-84dBm','-94dBm','-64dBm'], ans:0, ex:'5G RSRP = -156+82 = -74dBm. LTE는 -140 기준, 5G는 -156 기준.'}
    },
    {
      title:'SSB 구조와 PCI',
      content: '<div class="content-intro">단말이 기지국을 찾을 때 가장 먼저 동기를 맞춰야 해요. 이 동기 신호 블록이 SSB예요.</div><div class="key-box" style="background:#FFF7ED;border:1px solid #FED7AA;"><div class="key-box-title" style="color:#C2410C;">📌 SSB = PSS + SSS + PBCH (4개 Symbol)</div><div class="key-row"><span class="key-label">PSS</span><span class="key-val">Primary Sync Signal (Symbol 1)</span></div><div class="key-row"><span class="key-label">SSS</span><span class="key-val">Secondary Sync Signal (Symbol 3)</span></div><div class="key-row"><span class="key-label">PBCH</span><span class="key-val">Broadcast Channel (Symbol 2·4)</span></div></div><div class="key-box" style="background:#F0FDF4;border:1px solid #BBF7D0;"><div class="key-box-title" style="color:#059669;">📌 PCI 개수</div><div class="key-row"><span class="key-label">LTE PCI</span><span class="key-val">0~503 (504개)</span></div><div class="key-row"><span class="key-label">5G NR PCI</span><span class="key-val">0~1007 (<b>1008개</b>) = LTE의 2배!</span></div></div><div class="memo-box"><div class="memo-box-title">🧠 암기</div><div class="memo-text">PSS→1차 동기 → SSS→2차 동기 → PBCH→정보 수신. SSB 주기: 20ms. FR1 최대 8빔, FR2 최대 64빔.</div></div>',
      quiz: {q:'5G NR SSB 구성으로 맞는 것은?', opts:['PSS+SSS+PDSCH','PSS+SSS+PBCH','PSS+PBCH+PDCCH','SSS+PBCH+PDSCH'], ans:1, ex:'SSB = PSS(1st) + SSS(3rd) + PBCH(2nd·4th). 총 4개 Symbol.'}
    },
    {
      title:'Beamforming · Massive MIMO',
      content: '<div class="content-intro">MIMO는 여러 안테나로 데이터를 동시 전송, Beamforming은 여러 안테나로 신호를 한 방향에 집중해요. Massive MIMO는 둘을 합친 개념이에요.</div><div class="compare-table-wrap"><table class="compare-table"><tr><th>방식</th><th>특징</th></tr><tr><td><b>Analog BF</b></td><td>Phase Shifter, RF Chain 1개, 단순·저비용</td></tr><tr><td><b>Digital BF</b></td><td>각 안테나 RF Chain, 최고 성능, 비용 높음</td></tr><tr><td><b>Hybrid BF</b></td><td>Analog+Digital 결합, 5G 실제 적용</td></tr></table></div><div class="memo-box"><div class="memo-box-title">🧠 암기</div><div class="memo-text">Analog=단순 라디오 / Digital=복잡하고 비쌈 / Hybrid=하이브리드 차처럼 둘 다 → 5G 실제 사용</div></div>',
      quiz: {q:'5G 상용망에 주로 적용되는 Beamforming 방식은?', opts:['Analog','Digital','Hybrid','OFDM'], ans:2, ex:'Hybrid Beamforming은 Analog+Digital 결합으로 성능과 비용을 모두 만족. 5G 상용망 주력.'}
    },
    {
      title:'Bearer 종류 (MCG/SCG/Split)',
      content: '<div class="content-intro">EN-DC에서 단말은 LTE와 5G 두 경로로 데이터를 받을 수 있어요.</div><div class="key-box" style="background:#EFF6FF;border:1px solid #BFDBFE;"><div class="key-box-title" style="color:#2563EB;">📌 Bearer 3가지</div><div class="key-row"><span class="key-label">MCG Bearer</span><span class="key-val">LTE 경로만 (안정적)</span></div><div class="key-row"><span class="key-label">SCG Bearer</span><span class="key-val">5G 경로만 (고속)</span></div><div class="key-row"><span class="key-label">Split Bearer</span><span class="key-val">LTE+5G 동시 (최고속도, 실제 주력)</span></div></div><div class="memo-box"><div class="memo-box-title">🧠 암기</div><div class="memo-text">MCG=엄마(LTE)길 / SCG=아빠(5G)길 / Split=두 길 동시. M=Main(LTE), S=Secondary(5G)</div></div><div class="exam-box"><div class="exam-title">📝 SCG Failure</div><div class="exam-text">5G 신호 약화 시 → MCG(LTE)로 fallback. LTE eNB에 SCG Failure Report 전송.</div></div>',
      quiz: {q:'LTE+5G 두 경로를 동시에 사용하는 Bearer 방식은?', opts:['MCG Bearer','SCG Bearer','Split Bearer','Dual Bearer'], ans:2, ex:'Split Bearer는 LTE eNB와 5G gNB 두 경로를 모두 사용해 최고 속도. 실제 5G 상용망에서 주력.'}
    },
    {
      title:'변조방식 비트수 (QPSK~256QAM)',

var currentUnit=null, chapterOpen={}, chapterDone={}, quizState={};

function loadState(){try{var d=localStorage.getItem('oel_th_v3');if(d){var p=JSON.parse(d);chapterDone=p.done||{};}}catch(e){}}
function saveState(){try{localStorage.setItem('oel_th_v3',JSON.stringify({done:chapterDone}));}catch(e){}}

function renderHome(){
  var root=document.getElementById('root');
  var h='<div class="home-banner"><div class="banner-title">📚 이론학습 교재</div><div class="banner-sub">단원을 선택해서 자유롭게 공부하세요 🔊 음성 지원</div></div><div class="unit-grid">';
  UNITS.forEach(function(u){
    var total=u.chapters.length;
    var done=u.chapters.filter(function(_,ci){return chapterDone[u.id+'_'+ci];}).length;
    h+='<div class="unit-card" onclick="openUnit(\''+u.id+'\')" ontouchstart="">';
    h+='<div class="unit-emoji">'+u.emoji+'</div><div class="unit-info">';
    h+='<div class="unit-name">'+u.name+'</div><div class="unit-desc">'+u.desc+'</div>';
    h+='<div class="unit-progress">'+done+'/'+total+' 완료</div></div>';
    h+='<div style="font-size:18px;color:#CBD5E1">›</div></div>';
  });
  h+='</div>';
  root.innerHTML=h;
}

function openUnit(uid){
  currentUnit=null;
  UNITS.forEach(function(u){if(u.id===uid)currentUnit=u;});
  if(currentUnit)renderChapters();
}

function renderChapters(){
  var unit=currentUnit;
  var h='<div class="chapter-list"><button class="back-btn" onclick="goHome()" ontouchstart="">← 단원 목록</button>';
  h+='<div class="unit-title-bar"><div class="unit-title-name">'+unit.emoji+' '+unit.name+'</div></div>';
  unit.chapters.forEach(function(ch,ci){
    var key=unit.id+'_'+ci;
    var isOpen=!!chapterOpen[key];
    var isDone=!!chapterDone[key];
    h+='<div class="chapter-item"><div class="chapter-header" onclick="toggleChapter('+ci+')" ontouchstart="">';
    h+='<div class="ch-num">'+(ci+1)+'</div><div class="ch-title">'+ch.title+'</div>';
    if(isDone)h+='<div class="ch-done">✓완료</div>';
    h+='<div class="ch-arrow'+(isOpen?' open':'')+'">›</div></div>';
    if(isOpen){
      h+='<div class="chapter-body open">';
      h+='<button class="speak-btn" onclick="speakChapter('+ci+')" ontouchstart=""><span>🔊</span> 이 챕터 음성으로 듣기</button>';
      h+=ch.content;
      h+=renderQuiz(ci);
      if(!isDone)h+='<button class="done-btn" onclick="markDone('+ci+')" ontouchstart="">✅ 이 챕터 완료</button>';
      h+='</div>';
    } else {
      h+='<div class="chapter-body"></div>';
    }
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('root').innerHTML=h;
}

function toggleChapter(ci){
  var key=currentUnit.id+'_'+ci;
  chapterOpen[key]=!chapterOpen[key];
  renderChapters();
}
function goHome(){ttsStop();currentUnit=null;chapterOpen={};quizState={};renderHome();}
function markDone(ci){chapterDone[currentUnit.id+'_'+ci]=true;saveState();renderChapters();}

function renderQuiz(ci){
  var ch=currentUnit.chapters[ci];
  if(!ch.quiz)return'';
  var q=ch.quiz;
  var key=currentUnit.id+'_q_'+ci;
  var state=quizState[key]||{};
  var h='<div class="quiz-section"><div class="quiz-title">🎯 미니 퀴즈</div><div class="quiz-q">'+q.q+'</div><div class="quiz-opts">';
  q.opts.forEach(function(opt,oi){
    var cls='quiz-opt';
    if(state.answered){cls+=' disabled';if(oi===q.ans)cls+=' correct';else if(oi===state.chosen)cls+=' wrong';}
    h+='<button class="'+cls+'" onclick="answerQuiz('+ci+','+oi+')" ontouchstart="">'+opt+'</button>';
  });
  h+='</div>';
  if(state.answered)h+='<div class="quiz-ex show">💡 '+q.ex+'</div>';
  h+='</div>';
  return h;
}

function answerQuiz(ci,chosen){
  var key=currentUnit.id+'_q_'+ci;
  if(quizState[key]&&quizState[key].answered)return;
  quizState[key]={answered:true,chosen:chosen};
  renderChapters();
}

/* ============ TTS (iOS Safari 호환 청크 방식) ============ */
var ttsChunks=[],ttsIdx=0,ttsCurrentTitle='',ttsPaused=false,ttsTimer=null;

function extractText(html){
  var div=document.createElement('div');
  div.innerHTML=html;
  var removes=div.querySelectorAll('.quiz-section,.speak-btn');
  for(var i=0;i<removes.length;i++)removes[i].parentNode.removeChild(removes[i]);
  return (div.innerText||div.textContent||'').replace(/\s+/g,' ').trim();
}

function chunkText(text){
  var chunks=[],cur='';
  var parts=text.split(/(?<=[.?!,。、])\s*/);
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    if((cur+p).length>130&&cur.trim()){chunks.push(cur.trim());cur=p;}
    else cur+=p+' ';
  }
  if(cur.trim())chunks.push(cur.trim());
  return chunks.length?chunks:[text.slice(0,100)];
}

function speakChapter(ci){
  var ch=currentUnit.chapters[ci];
  ttsCurrentTitle=ch.title;
  var text=ch.title+'. '+extractText(ch.content);
  ttsChunks=chunkText(text);
  ttsIdx=0;ttsPaused=false;
  doSpeak();
}

function doSpeak(){
  if(ttsIdx>=ttsChunks.length){
    document.getElementById('ttsPlayBtn').textContent='▶ 재생';
    clearInterval(ttsTimer);return;
  }
  window.speechSynthesis.cancel();
  var utt=new SpeechSynthesisUtterance(ttsChunks[ttsIdx]);
  utt.lang='ko-KR';
  utt.rate=parseFloat(document.getElementById('ttsSpeed').value||'0.85');
  utt.onend=function(){if(!ttsPaused){ttsIdx++;doSpeak();}};
  utt.onerror=function(e){if(e.error!=='interrupted'){ttsIdx++;setTimeout(doSpeak,200);}};
  window.speechSynthesis.speak(utt);
  document.getElementById('ttsTitle').textContent=ttsCurrentTitle+' ('+(ttsIdx+1)+'/'+ttsChunks.length+')';
  document.getElementById('ttsPlayBtn').textContent='⏸ 일시정지';
  document.getElementById('ttsBar').classList.remove('hidden');
  clearInterval(ttsTimer);
  ttsTimer=setInterval(function(){
    if(window.speechSynthesis.speaking&&!ttsPaused){
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }
  },10000);
}

function ttsPlayPause(){
  if(!window.speechSynthesis)return;
  if(window.speechSynthesis.speaking&&!ttsPaused){
    window.speechSynthesis.pause();ttsPaused=true;
    document.getElementById('ttsPlayBtn').textContent='▶ 재생';
    clearInterval(ttsTimer);
  } else if(ttsPaused){
    window.speechSynthesis.resume();ttsPaused=false;
    document.getElementById('ttsPlayBtn').textContent='⏸ 일시정지';
  } else if(ttsChunks.length){
    ttsPaused=false;doSpeak();
  }
}

function ttsStop(){
  window.speechSynthesis.cancel();clearInterval(ttsTimer);
  ttsPaused=false;ttsChunks=[];ttsIdx=0;
  document.getElementById('ttsPlayBtn').textContent='▶ 재생';
  document.getElementById('ttsBar').classList.add('hidden');
}

function ttsChangeSpeed(){
  if(window.speechSynthesis.speaking||ttsPaused){
    var idx=ttsIdx;
    window.speechSynthesis.cancel();clearInterval(ttsTimer);
    ttsPaused=false;
    setTimeout(function(){ttsIdx=idx;doSpeak();},200);
  }
}

document.addEventListener('visibilitychange',function(){
  if(!document.hidden&&window.speechSynthesis&&window.speechSynthesis.paused&&!ttsPaused)
    window.speechSynthesis.resume();
});

loadState();
renderHome();
</script>
