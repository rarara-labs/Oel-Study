<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OEL 품질분석 3급 이론학습</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#F8FAFC;color:#1E293B;max-width:480px;margin:0 auto;min-height:100vh;}
/* Touch */
[onclick],button,.unit-card,.chapter-header,.back-btn,.quiz-opt,.quiz-submit,.quiz-next{touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer;}
/* Header */
.app-header{background:linear-gradient(135deg,#1E3A5F,#2563EB);color:#fff;padding:16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.app-title{font-size:16px;font-weight:800;}
.app-sub{font-size:11px;opacity:.8;margin-top:2px;}
/* Home */
.home-banner{background:linear-gradient(135deg,#0F172A,#1E40AF);color:#fff;padding:20px 16px;text-align:center;}
.banner-title{font-size:22px;font-weight:900;margin-bottom:6px;}
.banner-sub{font-size:13px;opacity:.8;}
.unit-grid{padding:12px;}
.unit-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;}
.unit-emoji{font-size:28px;width:44px;text-align:center;}
.unit-info{flex:1;}
.unit-name{font-size:15px;font-weight:800;margin-bottom:3px;}
.unit-desc{font-size:11px;color:#64748B;}
.unit-progress{font-size:11px;font-weight:700;color:#2563EB;margin-top:4px;}
/* Chapter list */
.chapter-list{padding:12px;}
.back-btn{display:flex;align-items:center;gap:6px;background:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;color:#1E3A5F;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.unit-title-bar{background:linear-gradient(135deg,#1E3A5F,#2563EB);color:#fff;border-radius:12px;padding:14px;margin-bottom:12px;text-align:center;}
.unit-title-name{font-size:16px;font-weight:900;}
.chapter-item{background:#fff;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;}
.chapter-header{display:flex;align-items:center;padding:14px;gap:10px;}
.ch-num{width:26px;height:26px;border-radius:50%;background:#EFF6FF;color:#2563EB;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ch-title{flex:1;font-size:13px;font-weight:700;color:#1E293B;}
.ch-arrow{font-size:12px;color:#94A3B8;transition:transform .2s;}
.ch-arrow.open{transform:rotate(90deg);}
.ch-done{font-size:11px;color:#10B981;font-weight:700;}
/* Chapter Content */
.chapter-body{display:none;padding:0 14px 14px;border-top:1px solid #F1F5F9;}
.chapter-body.open{display:block;}
.content-intro{background:#F0F9FF;border-left:3px solid #2563EB;border-radius:0 8px 8px 0;padding:10px 12px;margin:10px 0;font-size:12.5px;line-height:1.8;color:#1E3A5F;}
.key-box{border-radius:12px;padding:12px 14px;margin:10px 0;}
.key-box-title{font-size:12px;font-weight:800;margin-bottom:8px;}
.key-row{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:12px;}
.key-row:last-child{border-bottom:none;}
.key-label{font-weight:700;color:#374151;min-width:80px;flex-shrink:0;}
.key-val{color:#1E293B;flex:1;}
.key-num{font-weight:900;color:#2563EB;}
.formula-inline{background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:12px;margin:10px 0;font-size:12.5px;font-family:monospace;line-height:2;}
.comment{color:#92400E;}
.result{font-weight:900;color:#D97706;}
.highlight{color:#DC2626;font-weight:700;}
.tip-box{background:#F0FDF4;border-left:3px solid #10B981;border-radius:0 8px 8px 0;padding:10px 12px;margin:10px 0;}
.tip-box-title{font-size:11px;font-weight:800;color:#065F46;margin-bottom:4px;}
.tip-text{font-size:12px;line-height:1.8;color:#064E3B;}
.warn-box{background:#FFF7ED;border-left:3px solid #F59E0B;border-radius:0 8px 8px 0;padding:10px 12px;margin:10px 0;}
.warn-title{font-size:11px;font-weight:800;color:#92400E;margin-bottom:4px;}
.warn-text{font-size:12px;line-height:1.8;color:#78350F;}
/* Enhancement boxes */
.memo-box{background:linear-gradient(135deg,#F0F9FF,#E0F2FE);border:1.5px solid #7DD3FC;border-radius:12px;padding:12px 14px;margin:10px 0;}
.memo-box-title{font-size:11px;font-weight:900;color:#0369A1;margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.memo-text{font-size:12px;line-height:1.8;color:#1E40AF;}
.trap-box{background:linear-gradient(135deg,#FFF1F2,#FFE4E6);border:1.5px solid #FDA4AF;border-radius:12px;padding:12px 14px;margin:10px 0;}
.trap-title{font-size:11px;font-weight:900;color:#BE123C;margin-bottom:8px;}
.trap-text{font-size:12px;line-height:1.8;color:#881337;}
.exam-box{background:linear-gradient(135deg,#F5F3FF,#EDE9FE);border:1.5px solid #A78BFA;border-radius:12px;padding:12px 14px;margin:10px 0;}
.exam-title{font-size:11px;font-weight:900;color:#6D28D9;margin-bottom:8px;}
.exam-text{font-size:12px;line-height:1.8;color:#4C1D95;}
/* Compare table */
.compare-table-wrap{overflow-x:auto;margin:10px 0;}
.compare-table{width:100%;border-collapse:collapse;font-size:11.5px;}
.compare-table th{background:#1E3A5F;color:#fff;padding:7px 6px;text-align:center;}
.compare-table td{padding:6px;border:1px solid #E2E8F0;text-align:center;}
.compare-table tr:nth-child(even) td{background:#F8FAFC;}
/* Quiz */
.quiz-section{background:#F8FAFC;border-radius:12px;padding:14px;margin-top:14px;border:1.5px solid #E2E8F0;}
.quiz-title{font-size:11px;font-weight:800;color:#6B7280;margin-bottom:10px;}
.quiz-q{font-size:13px;font-weight:700;color:#1E293B;margin-bottom:12px;line-height:1.6;}
.quiz-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.quiz-opt{background:#fff;border:1.5px solid #E2E8F0;border-radius:8px;padding:10px 12px;font-size:12.5px;text-align:left;transition:all .15s;}
.quiz-opt.correct{background:#ECFDF5;border-color:#10B981;color:#065F46;font-weight:700;}
.quiz-opt.wrong{background:#FFF1F2;border-color:#FDA4AF;color:#BE123C;}
.quiz-opt.disabled{pointer-events:none;}
.quiz-ex{background:#FFFBEB;border-radius:8px;padding:10px;font-size:12px;line-height:1.7;color:#92400E;margin-top:8px;display:none;}
.quiz-ex.show{display:block;}
.quiz-submit{width:100%;padding:10px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;margin-top:4px;}
.quiz-next{width:100%;padding:10px;background:#10B981;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;margin-top:6px;display:none;}
.done-btn{width:100%;padding:10px;background:#7C3AED;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;margin-top:14px;}

/* TTS Player */
.tts-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:linear-gradient(135deg,#0F172A,#1E3A5F);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.3);transition:all .3s;}
.tts-bar.hidden{transform:translateX(-50%) translateY(100%);}
.tts-btn{background:rgba(255,255,255,.15);border:none;border-radius:20px;color:#fff;padding:7px 14px;font-size:12px;font-weight:700;touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tts-btn.active{background:#2563EB;}
.tts-title{flex:1;font-size:11px;opacity:.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tts-speed{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:11px;padding:4px 6px;touch-action:manipulation;cursor:pointer;}
.speak-btn{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,#0369A1,#2563EB);border:none;border-radius:10px;color:#fff;padding:9px 14px;font-size:12px;font-weight:700;width:100%;margin-top:10px;touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent;}
</style>
</head>
<body ontouchstart="">
<div class="app-header">
  <div>
    <div class="app-title">📚 OEL 이론학습</div>
    <div class="app-sub">품질분석 3급 · 자유 선택</div>
  </div>
</div>
<div id="root"></div>
<script>
// ============================================================
// DATA
// ============================================================
const UNITS = [
  {
    id:'5g', name:'5G 기술', emoji:'📡', color:'#3B82F6', bg:'#EFF6FF',
    desc:'NR Frame · RSRP · SSB · Beamforming · MIMO · Bearer · 변조방식',
    chapters: [
      {
        title:'5G가 왜 필요한가? (IMT-2020 요구사항)',
        content: `
          <div class="content-intro">4G LTE는 최대 1Gbps를 목표로 만들어졌어요. 그런데 자율주행·IoT·AR 같은 서비스가 등장하면서 더 빠르고, 더 많이, 더 빠르게 반응하는 망이 필요해졌습니다. 국제통신연합(ITU)이 정한 5G 최소 성능 기준이 <b>IMT-2020</b>이에요.</div>
          <div class="key-box" style="background:#EFF6FF;border:1px solid #BFDBFE;">
            <div class="key-box-title" style="color:#3B82F6;">📌 ITU IMT-2020 핵심 수치 (시험 단골!)</div>
            <div class="key-row"><span class="key-label">최대 DL 속도</span><span class="key-val"><span class="key-num">20 Gbps</span> (다운로드)</span></div>
            <div class="key-row"><span class="key-label">최대 UL 속도</span><span class="key-val"><span class="key-num">10 Gbps</span> (업로드)</span></div>
            <div class="key-row"><span class="key-label">지연 시간</span><span class="key-val"><span class="key-num">1 ms</span> (LTE는 10ms)</span></div>
            <div class="key-row"><span class="key-label">이동 속도</span><span class="key-val"><span class="key-num">500 km/h</span> (고속철도 지원)</span></div>
            <div class="key-row"><span class="key-label">연결 밀도</span><span class="key-val">100만 기기/km² 지원</span></div>
          </div>
          <div class="tip-box">
            <div class="tip-box-title">💡 이렇게 기억하세요</div>
            <div class="tip-text">"DL 20 / UL 10 / 1ms / 500km/h" — LTE 대비 DL은 20배, 지연은 10배 빠릅니다!</div>
          </div>
          <div class="trap-box">
            <div class="trap-title">🪤 자주 틀리는 함정</div>
            <div class="trap-text">• UL이 10Gbps인데 DL과 헷갈리는 오답 多<br>• 지연시간 "10ms"는 LTE! 5G는 <b>1ms</b><br>• LTE 최대 DL = 1Gbps, 5G = 20Gbps → <b>20배 차이</b></div>
          </div>
          <div class="exam-box">
            <div class="exam-title">📝 시험 출제 포인트</div>
            <div class="exam-text">LTE vs 5G 비교 표로 출제됩니다.<br>LTE: DL <b>1Gbps</b>, 지연 <b>10ms</b><br>5G: DL <b>20Gbps</b>, 지연 <b>1ms</b> → 각 20배·10배 개선</div>
          </div>
        `,
        quiz: {q:'5G IMT-2020 기준 최대 다운링크(DL) 속도는?', opts:['10Gbps','20Gbps','1Gbps','100Gbps'], ans:1, ex:'ITU IMT-2020: DL 20Gbps / UL 10Gbps / 지연 1ms / 이동속도 500km/h'}
      },
      {
        title:'NSA vs SA · EN-DC란?',
        content: `
          <div class="content-intro">5G를 처음 상용화할 때 기존 LTE 코어(EPC)와 기지국을 그대로 쓰면서 5G NR 기지국만 추가하는 방식을 먼저 도입했어요. 이걸 <b>NSA(Non-Standalone)</b>라고 해요.</div>
          <div class="compare-table-wrap">
            <table class="compare-table">
              <tr><th>구분</th><th>NSA (현재 주력)</th><th>SA (미래 목표)</th></tr>
              <tr><td>코어망</td><td class="highlight">LTE EPC 사용</td><td>5G Core (5GC)</td></tr>
              <tr><td>제어</td><td class="highlight">LTE eNB가 담당</td><td>5G gNB가 담당</td></tr>
              <tr><td>5G 역할</td><td>데이터만 추가</td><td>제어+데이터 모두</td></tr>
              <tr><td>장점</td><td>빠른 구축, 저비용</td><td>완전한 5G 기능</td></tr>
            </table>
          </div>
          <div class="key-box" style="background:#F0FDF4;border:1px solid #BBF7D0;">
            <div class="key-box-title" style="color:#059669;">📌 EN-DC (E-UTRA NR Dual Connectivity)</div>
            <div class="key-row"><span class="key-label">MN (Master)</span><span class="key-val">LTE eNB — 제어 담당</span></div>
            <div class="key-row"><span class="key-label">SN (Secondary)</span><span class="key-val">5G gNB — 데이터 추가</span></div>
            <div class="key-row"><span class="key-label">코어망</span><span class="key-val">EPC (LTE 코어망)</span></div>
          </div>
          <div class="memo-box">
            <div class="memo-box-title">🧠 암기 스토리</div>
            <div class="memo-text">"UE(나) → eNB(LTE 선배) → gNB(5G 후배) → EPC(회사)"<br>LTE 선배가 먼저 연결해주고, 5G 후배를 소개시켜 줘요!</div>
          </div>
          <div class="trap-box">
            <div class="trap-title">🪤 혼동 주의</div>
            <div class="trap-text">NSA: 코어망 = LTE <b>EPC</b> (5GC 아님!)<br>SA: 코어망 = <b>5GC</b> (Next Generation Core)<br>시험에 "SA 구조 코어망은?" → <b>5GC</b></div>
          </div>
        `,
        quiz: {q:'5G NSA 구조에서 Master Node(MN)는?', opts:['5G gNB','LTE eNB','5G Core','EPC'], ans:1, ex:'NSA(Non-Standalone)에서 LTE eNB가 MN(제어 담당), 5G gNB가 SN(데이터 추가). 코어망은 LTE EPC 사용.'}
      },
      {
        title:'5G NR Frame 구조 (SCS·RB·TTI)',
        content: `
          <div class="content-intro">LTE는 항상 15kHz 간격으로 주파수를 나눠 사용했어요. 5G NR은 사용 주파수 대역에 따라 이 간격(SCS)을 유연하게 바꿀 수 있어요. SCS가 넓을수록 TTI(전송 시간)가 짧아져서 지연이 줄어요.</div>
          <div class="key-box" style="background:#FDF4FF;border:1px solid #E9D5FF;">
            <div class="key-box-title" style="color:#7C3AED;">📌 SCS별 RB 수와 TTI</div>
            <div class="key-row"><span class="key-label">3.5GHz</span><span class="key-val">SCS 30kHz / TTI <b>0.5ms</b> / 100MHz → <b>273 RB</b></span></div>
            <div class="key-row"><span class="key-label">28GHz</span><span class="key-val">SCS 120kHz / TTI <b>0.125ms</b> / 100MHz → <b>264 RB</b></span></div>
            <div class="key-row"><span class="key-label">LTE 비교</span><span class="key-val">SCS 15kHz / TTI 1ms / 20MHz → 100 RB</span></div>
          </div>
          <div class="formula-inline">
            TTI = 1ms ÷ (SCS ÷ 15kHz)
            <br><span class="comment">SCS 30kHz → 1ms ÷ 2 = </span><span class="result">0.5ms</span>
            <br><span class="comment">SCS 120kHz → 1ms ÷ 8 = </span><span class="result">0.125ms</span>
          </div>
          <div class="memo-box">
            <div class="memo-box-title">🧠 숫자 암기법</div>
            <div class="memo-text"><b>3.5GHz = "삼오" → 2·7·3</b> → 273 RB, 0.5ms<br><b>28GHz = "이팔" → 2·6·4</b> → 264 RB, 0.125ms<br><br>TTI 법칙: SCS 2배 → TTI 절반<br>15→30kHz(×2) → 1ms→0.5ms(÷2)<br>15→120kHz(×8) → 1ms→0.125ms(÷8)</div>
          </div>
          <div class="exam-box">
            <div class="exam-title">📝 FR1 vs FR2</div>
            <div class="exam-text"><b>FR1</b> (Sub-6GHz): 450MHz~6GHz, 3.5GHz 포함<br><b>FR2</b> (mmWave): 24.25~52.6GHz, 28GHz 포함<br>FR2는 초고속이지만 커버리지가 좁아서 실내/핫스팟 위주</div>
          </div>
        `,
        quiz: {q:'5G NR 3.5GHz(SCS 30kHz, 100MHz) 사용 시 RB 수와 TTI는?', opts:['264개 / 0.125ms','273개 / 0.5ms','106개 / 1ms','132개 / 0.25ms'], ans:1, ex:'SCS 30kHz → TTI 0.5ms, 100MHz BW → 273 RB. 28GHz(SCS 120kHz)는 TTI 0.125ms, 264 RB.'}
      },
      {
        title:'5G RSRP 환산 (계산 필수!)',
        content: `
          <div class="content-intro">단말은 기지국 신호 세기를 숫자(rsrpResult)로 측정해서 MR 메시지로 보내요. 이 숫자를 실제 dBm으로 바꾸려면 공식이 필요해요. LTE와 5G가 <b>기준값이 다릅니다</b>!</div>
          <div class="formula-inline">
            LTE RSRP = -140 + rsrpResult (dBm)
            <br><span class="comment">예) rsrpResult=35 → -140+35 = </span><span class="result">-105dBm</span>
            <br><span class="comment">예) rsrpResult=56 → -140+56 = </span><span class="result">-84dBm</span>
          </div>
          <div class="formula-inline">
            5G SS-RSRP = -156 + rsrpResult (dBm)
            <br><span class="comment">예) rsrpResult=82 → -156+82 = </span><span class="result">-74dBm</span>
          </div>
          <div class="formula-inline">
            RSRQ = (rsrqResult - 40) ÷ 2 (dB)
            <br><span class="comment">예) rsrqResult=14 → (14-40)÷2 = </span><span class="result">-13dB</span>
          </div>
          <div class="warn-box">
            <div class="warn-title">⚠️ 주의</div>
            <div class="warn-text">LTE는 <b>-140</b>, 5G는 <b>-156</b>! 같은 rsrpResult라도 5G가 더 낮은 dBm이 나옵니다.</div>
          </div>
          <div class="memo-box">
            <div class="memo-box-title">🧠 숫자 암기 트릭</div>
            <div class="memo-text">LTE: <b>-140</b> → 4G = 4글자 → 140의 4로 끝<br>5G: <b>-156</b> → 5G = 156에서 5가 들어있음<br><br>또는: LTE(-140)보다 5G(-156)가 <b>16 더 작아요</b><br>→ 5G는 더 약한 신호도 잡을 수 있게 범위가 넓음</div>
          </div>
          <div class="trap-box">
            <div class="trap-title">🪤 계산 실수 주의</div>
            <div class="trap-text">MR 메시지에 rsrpResult=62라면:<br>LTE: -140+62 = <b>-78dBm</b><br>5G: -156+62 = <b>-94dBm</b><br>어떤 기술인지 먼저 확인하고 계산!</div>
          </div>
        `,
        quiz: {q:'5G NR MR 메시지에서 rsrpResult-r15=82일 때 SS-RSRP 값은?', opts:['-74dBm','-84dBm','-94dBm','-64dBm'], ans:0, ex:'5G RSRP = -156 + rsrpResult = -156 + 82 = -74dBm. LTE는 -140을 쓰지만 5G는 -156이 기준.'}
      },
      {
        title:'SSB 구조와 PCI (동기신호)',
        content: `
          <div class="content-intro">단말이 기지국을 찾을 때 가장 먼저 동기(Sync)를 맞춰야 해요. 5G NR에서 이 동기 신호 블록을 <b>SSB(Synchronization Signal Block)</b>라고 해요.</div>

    html += '<div class="unit-emoji">' + unit.emoji + '</div>';
    html += '<div class="unit-info">';
    html += '<div class="unit-name">' + unit.name + '</div>';
    html += '<div class="unit-desc">' + unit.desc + '</div>';
    html += '<div class="unit-progress">' + done + '/' + total + ' 완료</div>';
    html += '</div>';
    html += '<div style="font-size:18px;color:#CBD5E1">›</div>';
    html += '</div>';
  });
  html += '</div>';
  root.innerHTML = html;
}

// ============================================================
// RENDER CHAPTERS
// ============================================================
function openUnit(uid) {
  currentUnit = UNITS.find(u => u.id === uid);
  if (!currentUnit) return;
  renderChapters();
}

function renderChapters() {
  const unit = currentUnit;
  const root = document.getElementById('root');
  let html = '<div class="chapter-list">';
  html += '<button class="back-btn" onclick="goHome()" ontouchstart="">← 단원 목록</button>';
  html += '<div class="unit-title-bar"><div class="unit-title-name">' + unit.emoji + ' ' + unit.name + '</div></div>';
  unit.chapters.forEach((ch, ci) => {
    const key = unit.id + '_' + ci;
    const isOpen = !!chapterOpen[key];
    const isDone = !!chapterDone[key];
    html += '<div class="chapter-item">';
    html += '<div class="chapter-header" onclick="toggleChapter(' + ci + ')" ontouchstart="">';
    html += '<div class="ch-num">' + (ci + 1) + '</div>';
    html += '<div class="ch-title">' + ch.title + '</div>';
    if (isDone) html += '<div class="ch-done">✓완료</div>';
    html += '<div class="ch-arrow' + (isOpen ? ' open' : '') + '">›</div>';
    html += '</div>';
    if (isOpen) {
      html += '<div class="chapter-body open">';
      html += '<button class="speak-btn" onclick="speakChapter(' + ci + ')" ontouchstart=""><span style=\"font-size:16px\">🔊</span> 이 챕터 음성으로 듣기</button>';
      html += ch.content;
      html += renderQuiz(ci);
      if (!isDone) {
        html += '<button class="done-btn" onclick="markDone(' + ci + ')" ontouchstart="">✅ 이 챕터 완료</button>';
      }
      html += '</div>';
    } else {
      html += '<div class="chapter-body"></div>';
    }
    html += '</div>';
  });
  html += '</div>';
  root.innerHTML = html;
}

function toggleChapter(ci) {
  const key = currentUnit.id + '_' + ci;
  chapterOpen[key] = !chapterOpen[key];
  renderChapters();
}

function goHome() {
  currentUnit = null;
  chapterOpen = {};
  quizState = {};
  renderHome();
}

function markDone(ci) {
  const key = currentUnit.id + '_' + ci;
  chapterDone[key] = true;
  saveState();
  renderChapters();
}

// ============================================================
// QUIZ
// ============================================================
function renderQuiz(ci) {
  const ch = currentUnit.chapters[ci];
  if (!ch.quiz) return '';
  const q = ch.quiz;
  const key = currentUnit.id + '_q_' + ci;
  const state = quizState[key] || {};
  let html = '<div class="quiz-section">';
  html += '<div class="quiz-title">🎯 미니 퀴즈</div>';
  html += '<div class="quiz-q">' + q.q + '</div>';
  html += '<div class="quiz-opts">';
  q.opts.forEach((opt, oi) => {
    let cls = 'quiz-opt';
    if (state.answered) {
      cls += ' disabled';
      if (oi === q.ans) cls += ' correct';
      else if (oi === state.chosen) cls += ' wrong';
    }
    html += '<button class="' + cls + '" onclick="answerQuiz(' + ci + ',' + oi + ')" ontouchstart="">' + opt + '</button>';
  });
  html += '</div>';
  if (state.answered) {
    html += '<div class="quiz-ex show">💡 ' + q.ex + '</div>';
  } else {
    html += '<div class="quiz-ex"></div>';
  }
  html += '</div>';
  return html;
}

function answerQuiz(ci, chosen) {
  const key = currentUnit.id + '_q_' + ci;
  if (quizState[key] && quizState[key].answered) return;
  quizState[key] = { answered: true, chosen: chosen };
  renderChapters();
  // scroll to quiz
  setTimeout(() => {
    const items = document.querySelectorAll('.chapter-item');
    if (items[ci]) items[ci].scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 100);
}

// ============================================================
// INIT
// ============================================================
loadState();
renderHome();
</script>

<div class="tts-bar hidden" id="ttsBar">
  <button class="tts-btn" onclick="ttsPlayPause()" ontouchstart="" id="ttsPlayBtn">▶ 재생</button>
  <div class="tts-title" id="ttsTitle">-</div>
  <select class="tts-speed" id="ttsSpeed" onchange="ttsChangeSpeed()" ontouchstart="">
    <option value="0.7">0.7x</option>
    <option value="0.85" selected>0.85x</option>
    <option value="1.0">1.0x</option>
    <option value="1.2">1.2x</option>
  </select>
  <button class="tts-btn" onclick="ttsStop()" ontouchstart="">■ 정지</button>
</div>
